name: Bug Report
description: Report incorrect matching, parsing, packaging, or documentation behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include a minimal reproduction when possible.
  - type: input
    id: version
    attributes:
      label: Version or commit
      description: Which release, snapshot, or commit are you using?
      placeholder: 0.1.0-SNAPSHOT or commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide the smallest matcher, dictionaries, patterns, and input that reproduce the issue.
      render: java
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Java version, OS, build tool, and any relevant configuration.
      placeholder: Java 11, macOS 15, Maven 3.9.x

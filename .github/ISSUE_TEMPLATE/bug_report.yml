name: Bug report
description: Report incorrect matching, API behavior, or documentation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproducible example.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest matcher setup and input text that reproduces the issue.
      render: java
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0-SNAPSHOT or commit SHA"
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Include output from `mvn test` or `make smoke` if available.
      render: text

name: Feature Request
description: Suggest a matcher capability, API improvement, or tooling enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to accomplish, and what is hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: Show the desired usage if this is an API or matcher behavior request.
      render: java
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Backward compatible
        - Potentially breaking
        - Not sure
    validations:
      required: true

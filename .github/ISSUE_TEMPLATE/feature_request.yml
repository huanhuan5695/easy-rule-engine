name: Feature request
description: Propose a new matcher capability, API option, or performance improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What use case is not covered today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the API or behavior you want.
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example
      description: Show a pattern, dictionaries, input text, and expected output.
      render: java
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Backward compatible
        - Potentially breaking
        - Unsure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Build release artifacts
        run: mvn -B -DskipTests package

      - name: Run no-dependency smoke tests
        run: make smoke
